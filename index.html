<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWESPORTS | Les Grenadiers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .player-card:hover { border-color: #ef4444; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans p-6">

    <div class="flex gap-4 mb-8 justify-center">
        <button onclick="changeRoleFilter('all')" class="bg-red-600 px-4 py-2 rounded-lg">TOUS</button>
        <button onclick="changeRoleFilter('Gardiens')" class="bg-gray-800 px-4 py-2 rounded-lg">GARDIENS</button>
        <button onclick="changeRoleFilter('Défenseurs')" class="bg-gray-800 px-4 py-2 rounded-lg">DÉFENSEURS</button>
        <button onclick="changeRoleFilter('Milieux')" class="bg-gray-800 px-4 py-2 rounded-lg">MILIEUX</button>
        <button onclick="changeRoleFilter('Attaquants')" class="bg-gray-800 px-4 py-2 rounded-lg">ATTAQUANTS</button>
    </div>

    <div id="roster-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    <div id="player-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-[#0e1322] p-8 rounded-2xl max-w-lg w-full border border-gray-800">
            <div id="modal-body"></div>
            <button onclick="closeModal()" class="mt-6 bg-red-600 w-full py-2 rounded-lg">Fèmen</button>
        </div>
    </div>

    <script>
        const playersDataset = [
            { id: "jhonny_placide", name: "Johny Placide", role: "Gardiens", club: "SC Bastia" },
            { id: "frantzdy_pierrot", name: "Frantzdy Pierrot", role: "Attaquants", club: "Çaykur Rizespor" },
            { id: "ricardo_ade", name: "Ricardo Adé", role: "Défenseurs", club: "LDU Quito" },
            { id: "duckens_nazon", name: "Duckens Nazon", role: "Attaquants", club: "Kayserispor" }
            // Ou ka ajoute lòt yo menm jan an isit
        ];

        function renderRoster(list) {
            const grid = document.getElementById("roster-grid");
            grid.innerHTML = "";
            list.forEach(p => {
                const card = document.createElement("div");
                card.className = "bg-[#0e1322] border border-gray-800 p-6 rounded-xl cursor-pointer hover:border-red-500 transition";
                card.onclick = () => window.openPlayerModal(p.id);
                card.innerHTML = `<h3 class="font-bold text-lg">${p.name}</h3><p class="text-red-500 text-sm">${p.club}</p>`;
                grid.appendChild(card);
            });
        }

        window.changeRoleFilter = (role) => {
            const filtered = role === "all" ? playersDataset : playersDataset.filter(p => p.role === role);
            renderRoster(filtered);
        };

        window.openPlayerModal = (id) => {
            const p = playersDataset.find(player => player.id === id);
            if (!p) return;
            document.getElementById("modal-body").innerHTML = `<h2 class="text-2xl font-black">${p.name}</h2><p class="text-gray-400">${p.club}</p>`;
            document.getElementById("player-modal").classList.remove("hidden");
        };

        window.closeModal = () => document.getElementById("player-modal").classList.add("hidden");

        // Premye chajman
        document.addEventListener('DOMContentLoaded', () => renderRoster(playersDataset));
    </script>
</body>
</html>
