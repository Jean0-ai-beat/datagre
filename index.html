    // Fonksyon pou rann jwè yo san erè
    function renderRoster(list) {
        const grid = document.getElementById("roster-grid");
        if (!grid) return;
        grid.innerHTML = "";
        list.forEach(p => {
            const card = document.createElement("div");
            card.className = "player-card bg-[#0e1322] border border-gray-800 p-4 rounded-xl cursor-pointer hover:border-red-500 transition";
            card.onclick = () => openPlayerModal(p.id);
            card.innerHTML = `<div class="text-white font-bold">${p.name}</div><div class="text-gray-400 text-xs">${p.club}</div>`;
            grid.appendChild(card);
        });
    }

    // Fonksyon filtraj ak modal
    window.changeRoleFilter = (role) => {
        const filtered = role === "all" ? playersDataset : playersDataset.filter(p => p.role === role);
        renderRoster(filtered);
    };

    window.openPlayerModal = (id) => {
        const p = playersDataset.find(player => player.id === id);
        if (!p) return;
        const modal = document.getElementById("player-modal");
        const body = document.getElementById("modal-body");
        body.innerHTML = `<h2 class="text-white font-black text-2xl">${p.name}</h2><p class="text-red-500">${p.club}</p>`;
        modal.classList.remove("hidden");
    };

    window.closeModal = () => document.getElementById("player-modal").classList.add("hidden");

    document.addEventListener('DOMContentLoaded', () => renderRoster(playersDataset));
</script>
