<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWESPORTS | Grenadiers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white font-sans p-4">

    <div class="flex flex-wrap gap-2 mb-6 justify-center">
        <button onclick="changeRoleFilter('all')" class="bg-red-600 px-4 py-2 rounded-lg text-xs font-bold">TOUS</button>
        <button onclick="changeRoleFilter('Gardiens')" class="bg-gray-800 px-4 py-2 rounded-lg text-xs font-bold">GARDIENS</button>
        <button onclick="changeRoleFilter('Défenseurs')" class="bg-gray-800 px-4 py-2 rounded-lg text-xs font-bold">DÉFENSEURS</button>
        <button onclick="changeRoleFilter('Milieux')" class="bg-gray-800 px-4 py-2 rounded-lg text-xs font-bold">MILIEUX</button>
        <button onclick="changeRoleFilter('Attaquants')" class="bg-gray-800 px-4 py-2 rounded-lg text-xs font-bold">ATTAQUANTS</button>
    </div>

    <div id="roster-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>

    <div id="player-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-900 p-6 rounded-2xl max-w-sm w-full border border-gray-700">
            <div id="modal-body"></div>
            <button onclick="closeModal()" class="mt-4 w-full bg-gray-800 py-2 rounded-lg font-bold">FÈMEN</button>
        </div>
    </div>

    <script>
        const players = [
            { id: "p1", name: "Johny Placide", role: "Gardiens", club: "SC Bastia" },
            { id: "p2", name: "Alexandre Pierre", role: "Gardiens", club: "FC Sochaux" },
            { id: "p3", name: "Josué Duverger", role: "Gardiens", club: "FC Cosmos" },
            { id: "p4", name: "Ricardo Adé", role: "Défenseurs", club: "LDU Quito" },
            { id: "p5", name: "Hannes Delcroix", role: "Défenseurs", club: "FC Lugano" },
            { id: "p6", name: "Carlens Arcus", role: "Défenseurs", club: "Angers SCO" },
            { id: "p7", name: "Jean-Kévin Duverne", role: "Défenseurs", club: "KAA Gent" },
            { id: "p8", name: "Duke Lacroix", role: "Défenseurs", club: "Colorado" },
            { id: "p9", name: "Martin Expérience", role: "Défenseurs", club: "AS Nancy" },
            { id: "p10", name: "Wilguens Paugain", role: "Défenseurs", club: "Zulte Waregem" },
            { id: "p11", name: "Keeto Thermoncy", role: "Défenseurs", club: "Young Boys" },
            { id: "p12", name: "Jean-Ricner Bellegarde", role: "Milieux", club: "Wolves" },
            { id: "p13", name: "Danley Jean-Jacques", role: "Milieux", club: "Philadelphia" },
            { id: "p14", name: "Carl Fred Sainté", role: "Milieux", club: "FC Dallas" },
            { id: "p15", name: "Woodensky Pierre", role: "Milieux", club: "Violette AC" },
            { id: "p16", name: "Dominique Simon", role: "Milieux", club: "Tatran Prešov" },
            { id: "p17", name: "Leverton Pierre", role: "Milieux", club: "FC Vizela" },
            { id: "p18", name: "Frantzdy Pierrot", role: "Attaquants", club: "Çaykur Rizespor" },
            { id: "p19", name: "Duckens Nazon", role: "Attaquants", club: "Kayserispor" },
            { id: "p20", name: "Wilson Isidor", role: "Attaquants", club: "Sunderland" },
            { id: "p21", name: "Don Deedson Louicius", role: "Attaquants", club: "FC Dallas" },
            { id: "p22", name: "Derrick Etienne Jr.", role: "Attaquants", club: "Toronto FC" },
            { id: "p23", name: "Lenny Joseph", role: "Attaquants", club: "Ferencváros" },
            { id: "p24", name: "Josué Casimir", role: "Attaquants", club: "AJ Auxerre" },
            { id: "p25", name: "Rubens Providence", role: "Attaquants", club: "Almere City" },
            { id: "p26", name: "Yassin Fortuné", role: "Attaquants", club: "FC Vizela" }
        ];

        function render(list) {
            const grid = document.getElementById("roster-grid");
            grid.innerHTML = "";
            list.forEach(p => {
                const card = document.createElement("div");
                card.className = "bg-gray-900 p-4 rounded-xl border border-gray-800 cursor-pointer hover:border-red-600";
                card.onclick = () => openModal(p);
                card.innerHTML = `<h3 class="font-bold">${p.name}</h3><p class="text-xs text-red-500">${p.club}</p>`;
                grid.appendChild(card);
            });
        }

        window.changeRoleFilter = (role) => {
            const filtered = (role === 'all') ? players : players.filter(p => p.role === role);
            render(filtered);
        };

        window.openModal = (p) => {
            document.getElementById("modal-body").innerHTML = `<h2 class="text-xl font-bold">${p.name}</h2><p class="text-gray-400">${p.club}</p>`;
            document.getElementById("player-modal").classList.remove("hidden");
        };

        window.closeModal = () => document.getElementById("player-modal").classList.add("hidden");

        render(players);
    </script>
</body>
</html>
